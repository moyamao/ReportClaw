[mysql]
host = 127.0.0.1
port = 3306
user = xxxxxxx
pass = xxxxxxx
db   = stock

[crawler]
days_back = 30
##默认会重新解析并覆盖 annual_report_mda
reparse_existing = true
use_last_crawl = true
last_crawl_state_file = data/state/last_sent.json

outline_debug = true
outline_debug_max_pages = 30

## 多线程参数
[perf]
max_workers_download = 3
max_workers_parse = 15
parse_backend = process


[email]
enabled = false
host = smtp.sina.com
port = 465
use_ssl = true
timeout = 180
user = uuuuuuuuuu
pass = xxxxxxxxxxx
from = mm44@sina.com
to = sxxxxxxx@gmail.com;ttttttt@gmail.com

retries = 2
retry_sleep = 3
warn_mb = 2.0


[report]
daily_dir=data/report
state_file=data/state/last_sent.json

[epub]
enabled = true


[sheets]
enabled = true
spreadsheet_id = dddddddddddddd
worksheet = AnnualReports
credentials_json = conf/alert-smoke-411802-24e5da358203.json

# ✅ 新增：按周分表
worksheet_mode = weekly
worksheet_prefix = AR
tab_without_year = true
month_source = publish_date   # 继续用 publish_date / created_at 作为分桶来源
week_start = mon              # mon=周一开始（ISO周）；sun=周日开始
tab_auto_sort = true
tab_sort_desc = true

[sheets_daily]
enabled = true
